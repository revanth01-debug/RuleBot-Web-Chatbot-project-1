<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuleBot — AI Chatbot</title>
  <style>
    /* ── Reset & Base ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3248;
      --accent:    #6c63ff;
      --accent-lt: #8b85ff;
      --user-bg:   #6c63ff;
      --bot-bg:    #22263a;
      --text:      #e8eaf0;
      --muted:     #8890aa;
      --dot:       #3ddc84;
      --radius:    14px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Chat Window ────────────────────────────── */
    .chat-window {
      width: 100%;
      max-width: 680px;
      height: min(90dvh, 780px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dot);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Messages ───────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: slideUp 0.22s ease;
      min-width: 0;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg-row.user .msg-avatar {
      background: var(--accent);
    }

    .bubble {
      max-width: 72%;
      min-width: 80px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .msg-row.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.bot   .bubble { background: var(--bot-bg);  color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .timestamp {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      text-align: right;
    }

    .msg-row.bot .timestamp { text-align: left; }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }

    .dot-anim {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }

    .dot-anim:nth-child(2) { animation-delay: 0.2s; }
    .dot-anim:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Suggestions ────────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 16px 12px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Input Bar ──────────────────────────────── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      padding: 10px 16px;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover  { background: var(--accent-lt); }
    #send-btn:active { transform: scale(0.93); }

    #send-btn svg { fill: #fff; width: 17px; height: 17px; }

    /* disabled state */
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Session ended banner ───────────────────── */
    .session-ended {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding: 8px 0 4px;
    }
  </style>
</head>
<body>

<div class="chat-window">

  <!-- Header -->
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>RuleBot</h1>
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Online</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="sendChip('hello')">👋 hello</button>
    <button class="chip" onclick="sendChip('what is your name')">🤖 who are you?</button>
    <button class="chip" onclick="sendChip('tell me a joke')">😄 joke</button>
    <button class="chip" onclick="sendChip('what is python')">🐍 what is python?</button>
    <button class="chip" onclick="sendChip('help')">❓ help</button>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <input
      type="text"
      id="user-input"
      placeholder="Type a message…"
      autocomplete="off"
      autofocus
    />
    <button id="send-btn" onclick="handleSend()" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const suggestions = document.getElementById('suggestions');

  let sessionEnded = false;

  // ── Show welcome message on load ───────────────
  window.addEventListener('load', () => {
    appendMessage('bot', 'Hello! 👋 I\'m RuleBot, your rule-based AI chatbot.\nType anything to get started, or pick a suggestion below.\nType "exit" or "quit" to end the session.');
  });

  // ── Send on Enter key ──────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // ── Main send handler ──────────────────────────
  async function handleSend() {
    if (sessionEnded) return;

    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    appendMessage('user', text);
    setLoading(true);

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      removeTyping();
      appendMessage('bot', data.message);

      if (data.exit) {
        endSession();
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️ Could not reach the server. Make sure server.py is running.');
    }

    setLoading(false);
  }

  // ── Chip shortcut ──────────────────────────────
  function sendChip(text) {
    if (sessionEnded) return;
    inputEl.value = text;
    handleSend();
  }

  // ── Append a message bubble ────────────────────
  function appendMessage(role, text) {
    const row    = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av     = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'user' ? '🧑' : '🤖';

    const wrap   = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const ts     = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(ts);

    row.appendChild(av);
    row.appendChild(wrap);

    messagesEl.appendChild(row);
    scrollBottom();
  }

  // ── Typing indicator ───────────────────────────
  function setLoading(on) {
    sendBtn.disabled = on;
    inputEl.disabled = on;

    if (on) {
      const row    = document.createElement('div');
      row.className = 'msg-row bot typing';
      row.id = 'typing-row';

      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      [1,2,3].forEach(() => {
        const d = document.createElement('div');
        d.className = 'dot-anim';
        bubble.appendChild(d);
      });

      row.appendChild(av);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollBottom();
    }
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
    sendBtn.disabled = false;
    inputEl.disabled = false;
  }

  // ── End session ────────────────────────────────
  function endSession() {
    sessionEnded = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    suggestions.style.display = 'none';

    statusDot.style.background = '#ff5f57';
    statusText.textContent = 'Session ended';

    const banner = document.createElement('div');
    banner.className = 'session-ended';
    banner.textContent = '— Session ended. Refresh the page to start again. —';
    messagesEl.appendChild(banner);
    scrollBottom();
  }

  // ── Helpers ────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
</script>

</body>
</html>
